# Instruction implementation and test coverage ledger.
#
# Keep this file conservative: mark a form as implemented only when the emulator
# supports that listed form and the full regression suite protects it. A
# mnemonic-level grouping is not a claim that every encoding/form/operand size is
# implemented.

schema: cpueaxh.instruction-status.v1
granularity:
  required_identity_fields:
    - mnemonic
    - form.name
    - form.encoding
    - form.operands
    - form.operand_size
    - form.mode
    - form.feature_gate
  interpretation:
    implemented_means_only_listed_form: true
    unlisted_forms_are_supported: false

policy:
  new_instruction_pr_requires:
    - true_cpu_differential_tests_when_safe_and_supported
    - manual_or_model_coverage_for_unsafe_native_cases
    - full_regression_suite
    - ci_pass
    - small_reviewable_change
    - instruction_status_update

stage3_contracts:
  regression_gates: docs/stage3-regression-gates.yml
  generator_templates: docs/generator-templates.yml
  replay_schema: docs/replay-schema.md

status_values:
  - todo
  - implemented
  - implemented_partial
  - differential_tested
  - manual_tested
  - feature_gated
  - unsafe_for_native
  - blocked

