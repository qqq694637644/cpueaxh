name: extended-regression

on:
  workflow_dispatch:
    inputs:
      generated_seeds:
        description: Number of generated seeds per selected spec
        required: false
        default: "512"
      case_filter:
        description: Optional generated spec substring filter
        required: false
        default: ""
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read

jobs:
  hosted-long-regression:
    name: Hosted Windows long regression
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate regression contract
        shell: pwsh
        run: ./tools/validate-regression-contract.ps1

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Validate cpueaxh core header smoke
        shell: pwsh
        run: ./tools/validate-cpueaxh-header-smoke.ps1

      - name: Build test project
        shell: pwsh
        run: |
          msbuild cpueaxh.sln /m /p:Configuration=Release /p:Platform=x64 /t:test *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Locate test executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Recurse -Filter test.exe |
            Where-Object { $_.FullName -match '\\x64\\Release\\test\.exe$' } |
            Select-Object -First 1
          if (-not $exe) {
            throw 'test.exe was not produced under an x64\Release output directory'
          }
          "CPUEAXH_TEST_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Collect runner CPU info
        shell: pwsh
        run: |
          Get-CimInstance Win32_Processor |
            Select-Object Name,Manufacturer,NumberOfCores,NumberOfLogicalProcessors |
            Format-List |
            Out-File -FilePath cpu-info.txt -Encoding utf8

      - name: Dump test feature matrix
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --dump-features cpu-features.json
          $exitCode = $LASTEXITCODE
          Get-Content cpu-features.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Dump generated spec manifest
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --dump-specs generated-specs.json
          $exitCode = $LASTEXITCODE
          Get-Content generated-specs.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: List generated differential specs
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list *> test-specs.log
          $exitCode = $LASTEXITCODE
          Get-Content test-specs.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Validate generated spec manifest
        shell: pwsh
        run: ./tools/validate-generated-spec-manifest.ps1 -ManifestPath generated-specs.json

      - name: Validate instruction status coverage
        shell: pwsh
        run: ./tools/validate-instruction-status.ps1 -ManifestPath generated-specs.json

      - name: List manual coverage index
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list-manual *> manual-index.log
          $exitCode = $LASTEXITCODE
          Get-Content manual-index.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: List stage3 regression gates
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list-gates *> stage3-gates.log
          $exitCode = $LASTEXITCODE
          Get-Content stage3-gates.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Validate stage3 gate output
        shell: pwsh
        run: ./tools/validate-stage3-gate-output.ps1 -OutputPath stage3-gates.log

      - name: Replay manual coverage sample
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --replay test\manual\exception_priority.json --record-bundle manual-replay-bundle *> manual-replay.log
          $exitCode = $LASTEXITCODE
          Get-Content manual-replay.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Validate strict replay schema rejection
        shell: pwsh
        run: ./tools/validate-strict-replay.ps1 -TestExe "$env:CPUEAXH_TEST_EXE"

      - name: Validate required coverage gates
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list --require-feature base --require-spec add_rr_rax_rbx --require-family binary_reg_reg *> require-coverage.log
          $exitCode = $LASTEXITCODE
          Get-Content require-coverage.log
          if ($exitCode -ne 0) { exit $exitCode }

          & "$env:CPUEAXH_TEST_EXE" --list --require-feature definitely_missing *> require-coverage-negative.log
          $negativeFeatureExit = $LASTEXITCODE
          Get-Content require-coverage-negative.log | Tee-Object -FilePath require-coverage.log -Append
          if ($negativeFeatureExit -eq 0) { throw "missing required feature unexpectedly succeeded" }
          $global:LASTEXITCODE = 0
          exit 0

      - name: Run long generated regression
        shell: pwsh
        run: |
          $seedCount = '${{ inputs.generated_seeds }}'
          if ([string]::IsNullOrWhiteSpace($seedCount)) { $seedCount = '512' }
          $filter = '${{ inputs.case_filter }}'
          $args = @('--generated-seeds', $seedCount, '--record-bundle', 'failure-bundle')
          if (-not [string]::IsNullOrWhiteSpace($filter)) {
            $args += @('--filter', $filter)
          }
          & "$env:CPUEAXH_TEST_EXE" @args *> extended-test-run.log
          $exitCode = $LASTEXITCODE
          Get-Content extended-test-run.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpueaxh-extended-regression-diagnostics
          if-no-files-found: error
          path: |
            failure-bundle/**
            manual-replay-bundle/**
            build.log
            .header-smoke/cpueaxh-header-smoke.log
            extended-test-run.log
            test-specs.log
            manual-index.log
            stage3-gates.log
            manual-replay.log
            strict-replay.log
            require-coverage.log
            cpu-features.json
            generated-specs.json
            cpu-info.txt
