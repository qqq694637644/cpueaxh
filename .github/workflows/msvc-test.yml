name: msvc-test

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/msvc-test.yml"
      - "cpueaxh/**"
      - "test/**"
      - "docs/instruction-status.yml"
      - "cpueaxh.sln"
      - "**/*.vcxproj"
      - "**/*.props"
      - "**/*.targets"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/msvc-test.yml"
      - "cpueaxh/**"
      - "test/**"
      - "docs/instruction-status.yml"
      - "cpueaxh.sln"
      - "**/*.vcxproj"
      - "**/*.props"
      - "**/*.targets"

permissions:
  contents: read

jobs:
  test-x64:
    name: Windows x64 Release regression
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build test project
        run: msbuild cpueaxh.sln /m /p:Configuration=Release /p:Platform=x64 /t:test

      - name: Locate test executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Recurse -Filter test.exe |
            Where-Object { $_.FullName -match '\\x64\\Release\\test\.exe$' } |
            Select-Object -First 1
          if (-not $exe) {
            throw 'test.exe was not produced under an x64\Release output directory'
          }
          "CPUEAXH_TEST_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: List generated differential specs
        run: '& "$env:CPUEAXH_TEST_EXE" --list'

      - name: Run full regression suite
        run: '& "$env:CPUEAXH_TEST_EXE" --record-failure failure.json'

      - name: Upload failure replay record
        if: failure() && hashFiles('failure.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cpueaxh-failure-record
          path: failure.json
