name: msvc-test

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - ".github/pull_request_template.md"
      - "cpueaxh/**"
      - "test/**"
      - "TEST_FRAMEWORK_PLAN_CN.md"
      - "docs/development-workflow.md"
      - "docs/instruction-status.yml"
      - "docs/replay-schema.md"
      - "docs/instruction-test-generator-template.md"
      - "docs/hardware-runner-matrix.md"
      - "docs/stage3-regression-gates.yml"
      - "docs/generator-templates.yml"
      - "tools/**"
      - "cpueaxh.sln"
      - "**/*.vcxproj"
      - "**/*.props"
      - "**/*.targets"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - ".github/pull_request_template.md"
      - "cpueaxh/**"
      - "test/**"
      - "TEST_FRAMEWORK_PLAN_CN.md"
      - "docs/development-workflow.md"
      - "docs/instruction-status.yml"
      - "docs/replay-schema.md"
      - "docs/instruction-test-generator-template.md"
      - "docs/hardware-runner-matrix.md"
      - "docs/stage3-regression-gates.yml"
      - "docs/generator-templates.yml"
      - "tools/**"
      - "cpueaxh.sln"
      - "**/*.vcxproj"
      - "**/*.props"
      - "**/*.targets"

permissions:
  contents: read

jobs:
  test-x64:
    name: Windows x64 Release regression
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate regression contract
        shell: pwsh
        run: ./tools/validate-regression-contract.ps1

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build test project
        shell: pwsh
        run: |
          msbuild cpueaxh.sln /m /p:Configuration=Release /p:Platform=x64 /t:test *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Locate test executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Recurse -Filter test.exe |
            Where-Object { $_.FullName -match '\\x64\\Release\\test\.exe$' } |
            Select-Object -First 1
          if (-not $exe) {
            throw 'test.exe was not produced under an x64\Release output directory'
          }
          "CPUEAXH_TEST_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Collect runner CPU info
        shell: pwsh
        run: |
          Get-CimInstance Win32_Processor |
            Select-Object Name,Manufacturer,NumberOfCores,NumberOfLogicalProcessors |
            Format-List |
            Out-File -FilePath cpu-info.txt -Encoding utf8

      - name: Dump test feature matrix
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --dump-features cpu-features.json
          $exitCode = $LASTEXITCODE
          Get-Content cpu-features.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: List generated differential specs
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list *> test-specs.log
          $exitCode = $LASTEXITCODE
          Get-Content test-specs.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Dump generated spec manifest
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --dump-specs generated-specs.json
          $exitCode = $LASTEXITCODE
          Get-Content generated-specs.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Validate generated spec manifest
        shell: pwsh
        run: ./tools/validate-generated-spec-manifest.ps1 -ManifestPath generated-specs.json

      - name: Validate instruction status coverage
        shell: pwsh
        run: ./tools/validate-instruction-status.ps1 -ManifestPath generated-specs.json

      - name: List manual coverage index
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list-manual *> manual-index.log
          $exitCode = $LASTEXITCODE
          Get-Content manual-index.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: List stage3 regression gates
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --list-gates *> stage3-gates.log
          $exitCode = $LASTEXITCODE
          Get-Content stage3-gates.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Validate stage3 gate output
        shell: pwsh
        run: ./tools/validate-stage3-gate-output.ps1 -OutputPath stage3-gates.log

      - name: Replay manual coverage sample
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --replay test\manual\exception_priority.json --record-bundle manual-replay-bundle *> manual-replay.log
          $exitCode = $LASTEXITCODE
          Get-Content manual-replay.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Validate strict replay schema rejection
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force strict-replay | Out-Null
          @'
          {
            "schema": "cpueaxh.failure.v1",
            "case_selector": "add_rr_rax_rbx",
            "seed_index": 0,
            "image_hex": "00",
            "replay_hint": "test.exe --case add_rr_rax_rbx --seed-index 0"
          }
          '@ | Set-Content strict-replay\valid-generated-image-hex.json
          @'
          {
            "schema": "cpueaxh.failure.v1",
            "case_selector": "add_rr_rax_rbx",
            "seed_index": 0,
            "unknown": true
          }
          '@ | Set-Content strict-replay\generated-unknown-field.json
          @'
          {
            "schema": "cpueaxh.failure.v1",
            "case_selector": "add_rr_rax_rbx",
            "case_selector": "sub_rr_rax_rbx",
            "seed_index": 0
          }
          '@ | Set-Content strict-replay\generated-duplicate-case-selector.json
          @'
          {
            "schema": "cpueaxh.failure.v1",
            "case_selector": "add_rr_rax_rbx"
          }
          '@ | Set-Content strict-replay\generated-missing-seed-index.json
          @'
          {
            "schema": "cpueaxh.failure.v1",
            "case_selector": "add_rr_rax_rbx",
            "seed_index": 0,
          }
          '@ | Set-Content strict-replay\generated-trailing-comma.json
          @'
          {
            "schema": "cpueaxh.manual-index.v1",
            "case_selector": "exception_priority",
            "category": "manual",
            "replay": "test.exe --manual-case exception_priority --record-bundle failure-bundle"
          }
          '@ | Set-Content strict-replay\manual-missing-coverage.json
          @'
          {
            "schema": "cpueaxh.manual-index.v1",
            "case_selector": "exception_priority",
            "category": "manual",
            "coverage": "wrong coverage",
            "replay": "test.exe --manual-case exception_priority --record-bundle failure-bundle"
          }
          '@ | Set-Content strict-replay\manual-wrong-coverage.json
          @'
          {
            "schema": "cpueaxh.manual-index.v1",
            "case_selector": "exception_priority",
            "category": "manual",
            "coverage": "memory, stack, canonical-address, and UD exception ordering",
            "replay": "test.exe --manual-case exception_priority --record-bundle failure-bundle",
            "unknown": true
          }
          '@ | Set-Content strict-replay\manual-unknown-field.json

          function Invoke-ReplayExpect {
            param([string]$Path, [int]$ExpectedExit)
            "## $Path expected=$ExpectedExit" | Tee-Object -FilePath strict-replay.log -Append
            & "$env:CPUEAXH_TEST_EXE" --replay $Path *> strict-replay-case.log
            $exitCode = $LASTEXITCODE
            Get-Content strict-replay-case.log | Tee-Object -FilePath strict-replay.log -Append
            if ($ExpectedExit -eq 0 -and $exitCode -ne 0) { throw "Expected replay success for $Path, got $exitCode" }
            if ($ExpectedExit -ne 0 -and $exitCode -eq 0) { throw "Expected replay failure for $Path, got success" }
          }

          Invoke-ReplayExpect strict-replay\valid-generated-image-hex.json 0
          Invoke-ReplayExpect strict-replay\generated-unknown-field.json 2
          Invoke-ReplayExpect strict-replay\generated-duplicate-case-selector.json 2
          Invoke-ReplayExpect strict-replay\generated-missing-seed-index.json 2
          Invoke-ReplayExpect strict-replay\generated-trailing-comma.json 2
          Invoke-ReplayExpect strict-replay\manual-missing-coverage.json 2
          Invoke-ReplayExpect strict-replay\manual-wrong-coverage.json 2
          Invoke-ReplayExpect strict-replay\manual-unknown-field.json 2
          $global:LASTEXITCODE = 0
          exit 0

      - name: Run full regression suite
        shell: pwsh
        run: |
          & "$env:CPUEAXH_TEST_EXE" --record-bundle failure-bundle *> test-run.log
          $exitCode = $LASTEXITCODE
          Get-Content test-run.log
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload regression evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cpueaxh-regression-evidence
          if-no-files-found: error
          path: |
            cpu-features.json
            build.log
            generated-specs.json
            test-specs.log
            manual-index.log
            stage3-gates.log
            manual-replay.log
            strict-replay.log
            test-run.log
            cpu-info.txt

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpueaxh-failure-diagnostics
          if-no-files-found: error
          path: |
            failure-bundle/**
            manual-replay-bundle/**
            cpu-features.json
            build.log
            generated-specs.json
            test-specs.log
            manual-index.log
            stage3-gates.log
            manual-replay.log
            strict-replay.log
            test-run.log
            cpu-info.txt
